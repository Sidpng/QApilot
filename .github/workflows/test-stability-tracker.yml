name: test-stability-tracker

on:
  schedule:
    - cron: '30 0 * * *'   # 12:30 AM UTC = 6:00 AM IST daily
  workflow_run:
    workflows: [playwright-ci]
    types: [completed]
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ── 1. Run the suite (chromium only) to get fresh surefire XML ─────────────
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Install Playwright chromium
        run: >
          mvn -B -ntp org.codehaus.mojo:exec-maven-plugin:3.1.0:java
          -Dexec.mainClass=com.microsoft.playwright.CLI
          -Dexec.classpathScope=test
          -Dexec.args="install --with-deps chromium"

      - name: Run suite (headless, chromium)
        run: mvn -B -ntp test -Dheadless=true -Dbrowser=chromium
        continue-on-error: true   # tracker must run even when tests fail

      - name: Upload surefire reports
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          if-no-files-found: ignore
          retention-days: 1

  # ── 2. Ingest → append history → render dashboard ──────────────────────────
  track-stability:
    needs: run-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Download surefire reports
        uses: actions/download-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/

      - name: Run TestStabilityTracker
        run: |
          java tools/test-stability-tracker/TestStabilityTracker.java \
            target/surefire-reports \
            tools/test-stability-tracker/history/runs.ndjson \
            test-reports/dashboard/index.html \
            --browser chromium \
            --commit "${{ github.sha }}" \
            --window 30

      - name: Commit updated history and dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tools/test-stability-tracker/history/runs.ndjson \
                  test-reports/dashboard/index.html
          if git diff --cached --quiet; then
            echo "Nothing changed — skipping commit."
          else
            git commit -m "chore(stability): update test stability history and dashboard [skip ci]"
            git stash
            git pull --rebase origin main
            git stash pop
            git push --force-with-lease
          fi

  # ── 3. Publish dashboard to GitHub Pages ───────────────────────────────────
  deploy-pages:
    needs: track-stability
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main   # pull the commit that track-stability just pushed

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: test-reports/dashboard/

      - id: deployment
        uses: actions/deploy-pages@v4
