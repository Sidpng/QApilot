name: playwright-ci

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    name: test (${{ matrix.browser }})
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Compile
        run: mvn -B -ntp compile

      - name: Install Playwright browser (${{ matrix.browser }} + deps)
        run: >
          mvn -B -ntp org.codehaus.mojo:exec-maven-plugin:3.1.0:java
          -Dexec.mainClass=com.microsoft.playwright.CLI
          -Dexec.classpathScope=test
          -Dexec.args="install --with-deps ${{ matrix.browser }}"

      - name: Run TestNG suite (${{ matrix.browser }}, headless)
        run: mvn -B -ntp test -Dheadless=true -Dbrowser=${{ matrix.browser }}

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output-${{ matrix.browser }}
          path: |
            test-output/
            target/surefire-reports/
          if-no-files-found: ignore
          retention-days: 14
